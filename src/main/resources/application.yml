spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: reservation
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # DB 메타데이터 조회 실패 시 Dialect 오류로 위장되지 않게
        boot:
          allow_jdbc_metadata_access: false
        format_sql: false

server:
  port: ${PORT:8080}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://10.0.2.2:5173}
