spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: reservation
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://10.0.2.2:5173}
